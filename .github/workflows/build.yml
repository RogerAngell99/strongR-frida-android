name: strongR-frida

on:
  schedule:
    - cron: "0 9/12 * * *"
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Upstream Frida version to publish. Leave blank for latest."
        required: false
        type: string
      frida_source_ref:
        description: "Branch from RogerAngell99/frida to build. Leave blank for strongr-<version>."
        required: false
        type: string
      force_rebuild:
        description: "Build even if the release already has all expected assets."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  EXPECTED_ASSET_COUNT: "12"
  DEFAULT_FRIDA_SOURCE_REPO: https://github.com/RogerAngell99/frida.git
  DEFAULT_FRIDA_SOURCE_OWNER: RogerAngell99
  DEFAULT_FRIDA_SOURCE_NAME: frida

jobs:
  resolve_version:
    runs-on: ubuntu-22.04
    outputs:
      frida_version: ${{ steps.resolve.outputs.frida_version }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      existing_asset_count: ${{ steps.resolve.outputs.existing_asset_count }}

    steps:
      - name: Resolve target release and publish decision
        id: resolve
        uses: actions/github-script@v7
        env:
          REQUESTED_FRIDA_VERSION: ${{ github.event.inputs.frida_version || '' }}
          REQUESTED_FRIDA_SOURCE_REF: ${{ github.event.inputs.frida_source_ref || '' }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const requestedVersion = (process.env.REQUESTED_FRIDA_VERSION || '').trim();
            const requestedSourceRef = (process.env.REQUESTED_FRIDA_SOURCE_REF || '').trim();
            const forceRebuild = (process.env.FORCE_REBUILD || '').toLowerCase() === 'true';
            const expectedAssetCount = Number(process.env.EXPECTED_ASSET_COUNT || '12');

            let fridaVersion = requestedVersion;
            if (!fridaVersion) {
              const latest = await github.rest.repos.getLatestRelease({
                owner: 'frida',
                repo: 'frida',
              });
              fridaVersion = latest.data.tag_name;
            }

            let existingAssetCount = 0;
            let releaseExists = false;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: fridaVersion,
              });
              releaseExists = true;
              existingAssetCount = release.data.assets.length;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const shouldBuild = forceRebuild || !releaseExists || existingAssetCount < expectedAssetCount;
            const sourceRepoOwner = process.env.DEFAULT_FRIDA_SOURCE_OWNER;
            const sourceRepoName = process.env.DEFAULT_FRIDA_SOURCE_NAME;
            const sourceRef = requestedSourceRef || `strongr-${fridaVersion}`;

            try {
              await github.rest.git.getRef({
                owner: sourceRepoOwner,
                repo: sourceRepoName,
                ref: `heads/${sourceRef}`,
              });
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(
                  `Missing source branch ${sourceRef} in ${sourceRepoOwner}/${sourceRepoName}. ` +
                  `Create or pass frida_source_ref before publishing ${fridaVersion}.`
                );
                return;
              }
              throw error;
            }

            core.info(
              `frida_version=${fridaVersion}, source_ref=${sourceRef}, existing_asset_count=${existingAssetCount}, should_build=${shouldBuild}`
            );

            core.setOutput('frida_version', fridaVersion);
            core.setOutput('source_ref', sourceRef);
            core.setOutput('should_build', shouldBuild ? '1' : '0');
            core.setOutput('existing_asset_count', String(existingAssetCount));

  build_android:
    runs-on: ubuntu-22.04
    needs: resolve_version
    if: needs.resolve_version.outputs.should_build == '1'
    env:
      FRIDA_VERSION: ${{ needs.resolve_version.outputs.frida_version }}
      FRIDA_SOURCE_REPO: https://github.com/RogerAngell99/frida.git
      FRIDA_SOURCE_REF: ${{ needs.resolve_version.outputs.source_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install \
            build-essential \
            tree \
            ninja-build \
            gcc-multilib \
            g++-multilib \
            lib32stdc++-9-dev \
            flex \
            bison \
            ruby \
            ruby-dev \
            python3-requests \
            python3-setuptools \
            python3-dev \
            python3-pip \
            libc6-dev \
            libc6-dev-i386 \
            -y
          sudo gem install fpm -v 1.11.0 --no-document
          python -m pip install --upgrade pip
          python -m pip install lief

      - name: Build Frida for Android
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_NDK_ROOT="${{ steps.setup-ndk.outputs.ndk-path }}"

          git clone "$FRIDA_SOURCE_REPO" frida
          pushd frida
          git checkout "$FRIDA_SOURCE_REF"
          git submodule sync --recursive
          git submodule update --init --recursive
          popd

          for arch in android-arm android-arm64 android-x86 android-x86_64; do
            mkdir "build-$arch"
            pushd "build-$arch"
            ../frida/configure --host="$arch"
            make -j"$(nproc)"
            popd
          done

      - name: Package Android artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist

          for arch in android-arm android-arm64 android-x86 android-x86_64; do
            server_path="build-$arch/subprojects/frida-core/server/frida-server"
            inject_path="build-$arch/subprojects/frida-core/inject/frida-inject"
            gadget_path="build-$arch/subprojects/frida-core/lib/gadget/frida-gadget.so"

            for path in "$server_path" "$inject_path" "$gadget_path"; do
              if [[ ! -f "$path" ]]; then
                echo "::error::Missing build artifact: $path"
                exit 1
              fi
            done

            gzip -c "$server_path" > "dist/hluda-server-$FRIDA_VERSION-$arch.gz"
            gzip -c "$inject_path" > "dist/hluda-inject-$FRIDA_VERSION-$arch.gz"
            gzip -c "$gadget_path" > "dist/hluda-gadget-$FRIDA_VERSION-$arch.so.gz"
          done

          asset_count=$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [[ "$asset_count" != "$EXPECTED_ASSET_COUNT" ]]; then
            echo "::error::Expected $EXPECTED_ASSET_COUNT packaged assets, found $asset_count"
            exit 1
          fi

      - name: Upload packaged assets as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: strongr-android-${{ needs.resolve_version.outputs.frida_version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish_release:
    runs-on: ubuntu-22.04
    needs: [resolve_version, build_android]
    if: needs.resolve_version.outputs.should_build == '1' && needs.build_android.result == 'success'

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          name: strongr-android-${{ needs.resolve_version.outputs.frida_version }}
          path: dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_version.outputs.frida_version }}
          name: ${{ needs.resolve_version.outputs.frida_version }}
          files: |
            dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
